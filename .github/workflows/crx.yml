name: 打扩展包

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: C
      uses: actions/checkout@v4

    - name: P
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 依赖
      run: pip install cryptography

    - name: 私钥
      id: keygen
      run: |
        if [ ! -f key.pem ]; then
          openssl genpkey -algorithm RSA -out key.pem -pkeyopt rsa_keygen_bits:2048
        fi

    - name: 打包 crx（平铺）
      run: |
        zip -r 译览刀.zip ./* -x "*.git*" ".github/*" "*.md" "*.py" "*.crx" "*.zip" "*.pem"
        python crx.py 译览刀.zip key.pem 译览刀.crx

    - name: 打包 zip（含 extension 目录）
      run: |
        mkdir -p extension
        shopt -s extglob
        cp -r !(extension|.git|.github|*.md|*.py|*.crx|*.zip|*.pem) extension/ 2>/dev/null || true
        zip -r 译览刀.zip extension/
        rm -rf extension

    - name: 上传
      uses: actions/upload-artifact@v4
      with:
        name: chrome-extension
        path: |
          译览刀.crx
          译览刀.zip

    - name: 发布
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          译览刀.crx
          译览刀.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}