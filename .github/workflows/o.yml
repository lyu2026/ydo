name: 打扩展包

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: 代码
      uses: actions/checkout@v4

    - name: 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 依赖
      run: pip install cryptography

    - name: 私钥
      id: keygen
      run: |
        if [ ! -f key.pem ]; then
          openssl genpkey -algorithm RSA -out key.pem -pkeyopt rsa_keygen_bits:2048
        fi

    - name: 打包
      run: |
        zip -r o.zip ./* -x "*.git*" ".github/*" "*.md" "*.py" "*.crx" "*.zip" "*.pem"
        python pkg_crx.py o.zip key.pem trans_blade.crx
        rm o.zip

        mkdir -p build/extension
        shopt -s extglob
        cp -r !(build|.git|.github|*.md|*.py|*.crx|*.zip|*.pem) build/extension/ 2>/dev/null || true
        cd build && zip -r ../trans_blade.zip extension/ && cd ..
        rm -rf build

    - name: 上传
      uses: actions/upload-artifact@v4
      with:
        name: chrome-extension
        path: |
          trans_blade.crx
          trans_blade.zip

    - name: 发布
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          trans_blade.crx
          trans_blade.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}